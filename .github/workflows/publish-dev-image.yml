name: Publish Dev Images

run-name: Publish dev images from ${{ github.ref_name }} @ ${{ github.sha }}

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

concurrency:
  group: publish-dev-images
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-skill.txt

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Verify platform
        run: mvn -B verify

      - name: Verify Plugin and repository checks
        run: |
          make bootstrap
          make check

      - name: Verify Web
        working-directory: apps/web
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm build

  docker:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: core
            image: shigella520/mindtrain-core
            dockerfile: apps/trainer-core/Dockerfile
          - component: mcp
            image: shigella520/mindtrain-mcp
            dockerfile: apps/trainer-mcp/Dockerfile
          - component: web
            image: shigella520/mindtrain-web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=dev

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}-dev
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-dev
