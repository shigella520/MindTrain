openapi: 3.1.0
info:
  title: MindTrain Training Core API
  version: 1.0.0
servers:
  - url: http://127.0.0.1:8080
security:
  - bearerAuth: []
paths:
  /api/v1/sessions:
    post:
      operationId: createTrainingSession
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                domainId:
                  type: string
                  description: 可选；只有一个领域时 Core 自动选择，存在多个领域时必须显式传入。
                schedulerProvider:
                  type: string
                  enum: [weighted]
                  default: weighted
                  description: 稳定技术标识符；weighted 的中文展示名为“加权调度”。
      responses:
        '200': {description: Session created}
  /api/v1/sessions/{sessionId}/assignments/next:
    post:
      operationId: getNextAssignment
      parameters:
        - {name: sessionId, in: path, required: true, schema: {type: string}}
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Safe assignment or generation request with a Core-selected question type, difficulty, and knowledge point
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [assignment, generation_required, no_available_items, session_complete]
                  generationProfile:
                    oneOf:
                      - $ref: '#/components/schemas/GenerationProfile'
                      - type: 'null'
  /api/v1/assignments/{assignmentId}/attempts:
    post:
      operationId: submitChoiceAnswer
      parameters:
        - {name: assignmentId, in: path, required: true, schema: {type: string}}
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answer]
              properties:
                answer: {type: string}
      responses:
        '200': {description: Deterministic grading and explanation}
  /api/v1/assignments/{assignmentId}/reject:
    post:
      operationId: rejectGeneratedQuestion
      description: 仅允许拒绝尚未作答且属于当前用户 Session 的 AI 临时题；物理删除 Assignment、QuestionVersion 和 Question，并恢复主问题新题额度。
      parameters:
        - {name: assignmentId, in: path, required: true, schema: {type: string}}
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200': {description: 临时题已物理删除，可以请求替代题}
        '404': {description: Assignment 不存在或不属于当前用户}
        '409': {description: 题目已经作答，或不是可拒绝的 AI 临时题}
  /api/v1/sessions/{sessionId}/interactions:
    post:
      operationId: recordInteraction
      parameters:
        - {name: sessionId, in: path, required: true, schema: {type: string}}
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200': {description: Interaction appended without consuming the assignment}
  /api/v1/sessions/{sessionId}/finish:
    post:
      operationId: finishTrainingSession
      parameters:
        - {name: sessionId, in: path, required: true, schema: {type: string}}
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200': {description: Session completed}
  /api/v1/candidates:
    post:
      operationId: createCandidateQuestion
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200': {description: Session-scoped temporary candidate accepted; answering activates it for ordinary scheduling}
  /api/v1/questions/{questionId}/revisions:
    post:
      operationId: reviseActiveQuestion
      description: 基于当前可复习题创建不可变的新版本；旧 Assignment 和 Attempt 继续引用原版本。
      parameters:
        - {name: questionId, in: path, required: true, schema: {type: string}}
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [expectedVersion, changes, reason]
              properties:
                expectedVersion: {type: integer, minimum: 1}
                changes:
                  type: object
                  description: 只提交需要变更的题目字段；不允许修改 id、version、status 和审计字段。
                reason: {type: string, minLength: 1}
                sourceAssignmentId: {type: string}
                model: {type: string}
                promptVersion: {type: string}
      responses:
        '200': {description: 新版本已保存并写入修订审计记录}
        '400': {description: 修订字段、来源 Assignment 或题目结构无效}
        '409': {description: 题目不是 active 可复习题，或 expectedVersion 已过期}
  /api/v1/reports/overview:
    get:
      operationId: getLearningReport
      description: 默认要求 Bearer Token；仅当实例显式开启公开看板时允许匿名读取聚合统计。
      responses:
        '200':
          description: 学习与内容概览；包含按 reportingTimeZone 统计的今日主问题数、每日目标、调度配额，以及不泄露目录详情的领域与知识点聚合数量。
  /api/v1/schedulers/backlog:
    get:
      operationId: getSchedulerBacklog
      description: 默认要求 Bearer Token；仅当实例显式开启公开看板时允许匿名读取调度积压。
      parameters:
        - {name: domainId, in: query, required: false, schema: {type: string}, description: 可选训练领域过滤；省略时返回全局聚合。}
      responses:
        '200': {description: Due backlog and new-item allowance}
  /api/v1/settings/training:
    get:
      operationId: getTrainingSettings
      description: 读取数据库中的应用级训练配置；需要 Bearer Token。
      responses:
        '200':
          description: 当前训练配置，reviewBudget 等于 questionCount 减 newBudget。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/TrainingSettings'}
    put:
      operationId: updateTrainingSettings
      description: 更新应用级训练配置；新建 Session 随即使用新配置，已有 Session 保持创建时的 targetCount。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTrainingSettings'
      responses:
        '200':
          description: 配置已保存
          content:
            application/json:
              schema: {$ref: '#/components/schemas/TrainingSettings'}
        '400': {description: 配置值或时区无效}
  /api/v1/catalog/domains:
    get:
      operationId: listKnowledgeDomains
      description: 列出当前用户的所有训练领域；知识目录始终要求认证，不受公开 Dashboard 开关影响。
      parameters:
        - {name: q, in: query, required: false, schema: {type: string}}
      responses:
        '200':
          description: 领域及根节点、知识点和题目覆盖统计
          content:
            application/json:
              schema: {type: array, items: {$ref: '#/components/schemas/KnowledgeDomain'}}
  /api/v1/catalog/domains/{domainId}/tree:
    get:
      operationId: getKnowledgeCatalogTree
      parameters:
        - {name: domainId, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          description: 一个领域下按稳定顺序组织的多根知识点森林
        '404': {description: Domain not found for the authenticated user}
  /api/v1/catalog/topics/search:
    get:
      operationId: searchKnowledgeTopics
      parameters:
        - {name: q, in: query, required: true, schema: {type: string, minLength: 1}}
        - {name: domainId, in: query, required: false, schema: {type: string}}
        - {name: limit, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}
        - {name: cursor, in: query, required: false, schema: {type: string}}
      responses:
        '200': {description: 匹配知识点、所属领域和祖先路径}
  /api/v1/catalog/topics/{topicId}:
    get:
      operationId: getKnowledgeTopic
      parameters:
        - {name: topicId, in: path, required: true, schema: {type: string}}
      responses:
        '200': {description: 知识点详情、子节点、关系、来源、题目覆盖和掌握度}
        '404': {description: Topic not found for the authenticated user}
  /api/v1/catalog/drafts/preview:
    post:
      operationId: previewTrainingDomain
      description: 校验并保存由本地资料或 AI 对话整理出的不可变训练领域草案，不修改正式目录。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CatalogPreviewRequest'}
      responses:
        '200':
          description: 草案、哈希、校验结果和差异
          content:
            application/json:
              schema: {$ref: '#/components/schemas/TrainingDomainDraft'}
  /api/v1/catalog/drafts/{draftId}:
    get:
      operationId: getTrainingDomainDraft
      parameters:
        - {name: draftId, in: path, required: true, schema: {type: string}}
      responses:
        '200': {description: Training-domain draft preview}
        '404': {description: Draft not found for the authenticated user}
  /api/v1/catalog/drafts/{draftId}/confirm:
    post:
      operationId: confirmTrainingDomain
      description: 用户确认后，使用预览返回的精确 proposalHash 原子写入正式知识目录。
      parameters:
        - {name: draftId, in: path, required: true, schema: {type: string}}
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [proposalHash]
              properties:
                proposalHash: {type: string, pattern: '^[0-9a-f]{64}$'}
      responses:
        '200': {description: Draft confirmed or an idempotent prior result}
        '409': {description: Hash mismatch, conflict, invalid or already discarded draft}
  /api/v1/catalog/drafts/{draftId}/discard:
    post:
      operationId: discardTrainingDomainDraft
      parameters:
        - {name: draftId, in: path, required: true, schema: {type: string}}
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200': {description: Draft discarded without changing active catalog}
  /api/v1/catalog/imports/preview:
    post:
      deprecated: true
      operationId: previewKnowledgeCatalogImport
      description: previewTrainingDomain 的本地资料兼容别名。
      parameters: [{$ref: '#/components/parameters/IdempotencyKey'}]
      responses:
        '200': {description: Compatibility response}
  /api/v1/catalog/imports/{importId}:
    get:
      deprecated: true
      operationId: getKnowledgeCatalogImport
      parameters: [{name: importId, in: path, required: true, schema: {type: string}}]
      responses:
        '200': {description: Compatibility response}
  /api/v1/catalog/imports/{importId}/apply:
    post:
      deprecated: true
      operationId: applyKnowledgeCatalogImport
      parameters:
        - {name: importId, in: path, required: true, schema: {type: string}}
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200': {description: Compatibility response}
  /api/v1/catalog/imports/{importId}/reject:
    post:
      deprecated: true
      operationId: rejectKnowledgeCatalogImport
      parameters:
        - {name: importId, in: path, required: true, schema: {type: string}}
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200': {description: Compatibility response}
components:
  schemas:
    CatalogPreviewRequest:
      type: object
      required: [originType, proposal]
      properties:
        originType: {type: string, enum: [local_reference, ai_dialogue]}
        libraryId: {type: string}
        context:
          type: object
          description: 学习目标、受众、范围、模型和 Prompt 版本；不保存完整聊天记录。
        proposal:
          type: object
          required: [domains, topics, relations, sources]
          description: 只包含知识体系及来源元数据；禁止绝对路径、原文和抽取文本。
          properties:
            domains: {type: array, items: {type: object}}
            topics: {type: array, items: {type: object}}
            relations: {type: array, items: {type: object}}
            sources: {type: array, items: {$ref: '#/components/schemas/SourceAsset'}}
    SourceAsset:
      type: object
      required: [id, sourceType, url, title, accessedAt]
      properties:
        id: {type: string}
        sourceType: {type: string}
        url: {type: string}
        libraryId: {type: string}
        relativePath: {type: string}
        contentHash: {type: string, pattern: '^[0-9a-f]{64}$'}
        title: {type: string}
        accessedAt: {type: string, format: date}
        locator: {type: string}
    TrainingDomainDraft:
      type: object
      required: [draftId, importId, originType, context, proposalHash, status, proposal, validation, diff, createdAt]
      properties:
        draftId: {type: string, description: 新工具使用的训练领域草案 ID}
        importId: {type: string}
        originType: {type: string, enum: [local_reference, ai_dialogue]}
        libraryId: {type: string}
        context: {type: object}
        proposalHash: {type: string}
        status: {type: string, enum: [previewed, invalid, conflict, applied, rejected]}
        proposal: {type: object}
        validation: {type: object}
        diff: {type: object}
        createdAt: {type: string, format: date-time}
        appliedAt: {type: [string, 'null'], format: date-time}
        rejectedAt: {type: [string, 'null'], format: date-time}
    KnowledgeDomain:
      type: object
      required: [id, name, description, originType, rootTopicCount, topicCount, activeQuestionCount]
      properties:
        id: {type: string}
        name: {type: string}
        description: {type: string}
        originType: {type: string, enum: [local_reference, ai_dialogue, legacy]}
        rootTopicCount: {type: integer, minimum: 0}
        topicCount: {type: integer, minimum: 0}
        activeQuestionCount: {type: integer, minimum: 0}
    UpdateTrainingSettings:
      type: object
      required: [questionCount, newBudget, backlogPauseThreshold, overduePauseDays, pendingCandidateTtlHours, reportingTimeZone]
      properties:
        questionCount: {type: integer, minimum: 1, maximum: 100}
        newBudget: {type: integer, minimum: 0, description: 必须小于或等于 questionCount}
        backlogPauseThreshold: {type: integer, minimum: 0, maximum: 10000}
        overduePauseDays: {type: integer, minimum: 1, maximum: 365}
        pendingCandidateTtlHours: {type: integer, minimum: 1, maximum: 8760}
        reportingTimeZone: {type: string, example: Asia/Shanghai}
    TrainingSettings:
      allOf:
        - $ref: '#/components/schemas/UpdateTrainingSettings'
        - type: object
          required: [reviewBudget, updatedAt]
          properties:
            reviewBudget: {type: integer, minimum: 0, description: questionCount - newBudget}
            updatedAt: {type: string, format: date-time}
            updatedBy: {type: [string, 'null']}
    GenerationProfile:
      type: object
      required: [questionType, difficulty, knowledgePoint]
      properties:
        questionType:
          type: string
          enum: [single_choice, multiple_choice]
        difficulty:
          type: integer
          minimum: 1
          maximum: 5
        knowledgePoint:
          type: object
          required: [topicId, name, importance, applicableVersions, keywords, sourceRefs, sourceReferences, referenceLibraryIds]
          properties:
            topicId: {type: string}
            name: {type: string}
            importance: {type: integer, minimum: 1, maximum: 5}
            applicableVersions: {type: array, items: {type: string}}
            javaVersions:
              type: array
              deprecated: true
              description: 向后兼容字段；新客户端使用 applicableVersions。
              items: {type: string}
            keywords: {type: array, items: {type: string}}
            sourceRefs: {type: array, items: {type: string}}
            sourceReferences:
              type: array
              items: {$ref: '#/components/schemas/SourceAsset'}
            referenceLibraryIds:
              type: array
              items: {type: string}
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: {type: string, minLength: 1}
